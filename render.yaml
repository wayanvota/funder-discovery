services:
  - type: web
    name: funder-discovery
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    previews:
      generation: automatic
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
