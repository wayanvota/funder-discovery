services:
  - type: web
    name: funder-discovery-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PUBLIC_ORIGIN
        value: https://wayan.com
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_API_KEY
        sync: false
